<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>韓文單字學習網</title>
    <style>
        body { font-family: sans-serif; background: #f5f7fb; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 500px; }
        .panel { display: none; } .panel.active { display: block; }
        .word { font-size: 32px; font-weight: bold; color: #4a90e2; margin: 15px 0; }
        input { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; }
        canvas { border: 2px dashed #ccc; width: 100%; height: 100px; margin: 10px 0; }
        button { padding: 8px 12px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <button onclick="switchTab('quiz')">測驗</button>
    <button onclick="switchTab('manage')">管理</button>

    <div id="quiz" class="panel active">
        <select id="filterCategory" onchange="showQuestion()"><option value="全部">全部分類</option></select>
        <div id="question" class="word">...</div>
        <input type="text" id="answer" placeholder="輸入韓文">
        <button onclick="checkAnswer()">確認</button>
        <button onclick="speakCurrent()">重聽 🔊</button>
        <canvas id="drawCanvas"></canvas>
        <button onclick="clearCanvas()">清除手寫</button>
    </div>

    <div id="manage" class="panel">
        <input id="newCh" placeholder="中文">
        <input id="newKr" placeholder="韓文">
        <input id="newCat" placeholder="分類名稱">
        <button onclick="addWord()">新增單字</button>
        <div id="wordList"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    // === 請在此填入你原本的 firebaseConfig ===
    const firebaseConfig = { 
       apiKey: "AIzaSyCj20LGt2WR0TWw-kszy5FNYAXQYVVCEdc",
        authDomain: "kr-quiz.firebaseapp.com",
        databaseURL: "https://kr-quiz-default-rtdb.firebaseio.com",
        projectId: "kr-quiz",
        storageBucket: "kr-quiz.firebasestorage.app",
        messagingSenderId: "1049086906902",
        appId: "1:1049086906902:web:6e366746cd757022cedb37",
        measurementId: "G-M1Z2N0E1TX"
};
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let words = {}, currentIndex = 0;

    // 音效與語音
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function speak(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'ko-KR'; window.speechSynthesis.speak(u); }
    function speakCurrent() { let list = getFiltered(); speak(list[currentIndex].kr); }

    // 邏輯處理
    db.ref('words').on('value', (s) => {
        words = s.val() || {};
        renderManage(); updateCategories(); showQuestion();
    });

    function getFiltered() {
        let cat = document.getElementById('filterCategory').value;
        let list = Object.keys(words).map(k => ({id: k, ...words[k]}));
        return cat === '全部' ? list : list.filter(w => w.cat === cat);
    }

    function showQuestion() {
        let list = getFiltered();
        if(list.length === 0) return;
        document.getElementById('question').innerText = list[currentIndex % list.length].ch;
        speakCurrent();
    }

    function checkAnswer() {
        let list = getFiltered();
        if(document.getElementById('answer').value === list[currentIndex % list.length].kr) {
            alert("答對！"); currentIndex++; showQuestion();
        } else { alert("再試一次"); }
    }

    function addWord() {
        db.ref('words').push({ch: document.getElementById('newCh').value, kr: document.getElementById('newKr').value, cat: document.getElementById('newCat').value || '未分類'});
    }

    function delWord(id) { db.ref('words/' + id).remove(); }

    function renderManage() {
        let html = '';
        Object.keys(words).forEach(k => {
            html += `<div>${words[k].cat} | ${words[k].ch}:${words[k].kr} <button onclick="delWord('${k}')">刪除</button></div>`;
        });
        document.getElementById('wordList').innerHTML = html;
    }

    function updateCategories() {
        let cats = new Set(Object.values(words).map(w => w.cat || '未分類'));
        let sel = document.getElementById('filterCategory');
        sel.innerHTML = '<option value="全部">全部分類</option>';
        cats.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
    }

    // 介面與畫布
    function switchTab(id) { document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    const canvas = document.getElementById('drawCanvas'); const ctx = canvas.getContext('2d');
    canvas.onmousedown = (e) => { ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); canvas.onmousemove = (e) => { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); }; };
    canvas.onmouseup = () => canvas.onmousemove = null;
    function clearCanvas() { ctx.clearRect(0,0,canvas.width, canvas.height); }
</script>
</body>
</html>
