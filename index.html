<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓文聽寫練習</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7fb; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .word { font-size: 24px; color: #7f8c8d; margin-bottom: 20px; }
        input { width: 90%; padding: 15px; font-size: 20px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; text-align: center; }
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        button { padding: 12px 20px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; color: white; }
        .check-btn { background: #4a90e2; }
        .replay-btn { background: #95a5a6; }
    </style>
</head>
<body>
<div class="container">
    <div id="question" class="word">載入中...</div>
    <input type="text" id="answer" placeholder="請輸入韓文" autocomplete="off">
    <div class="btn-group">
        <button class="replay-btn" onclick="speakCurrent()">重聽 🔊</button>
        <button class="check-btn" onclick="checkAnswer()">確認答案</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCj20LGt2WR0TWw-kszy5FNYAXQYVVCEdc",
        authDomain: "kr-quiz.firebaseapp.com",
        databaseURL: "https://kr-quiz-default-rtdb.firebaseio.com",
        projectId: "kr-quiz",
        storageBucket: "kr-quiz.firebasestorage.app",
        messagingSenderId: "1049086906902",
        appId: "1:1049086906902:web:6e366746cd757022cedb37"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let quizList = [];
    let currentIndex = 0;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq) {
        const osc = audioCtx.createOscillator();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function speak(text) {
        window.speechSynthesis.cancel(); // 先清除未完成的朗讀
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ko-KR';
        window.speechSynthesis.speak(utterance);
    }

    function speakCurrent() {
        speak(quizList[currentIndex].kr);
    }

    db.ref('words').on('value', (snapshot) => {
        const data = snapshot.val();
        quizList = Object.values(data);
        showQuestion();
    });

    function showQuestion() {
        const q = quizList[currentIndex];
        document.getElementById('question').innerText = q.ch;
        speak(q.kr);
    }

    function checkAnswer() {
        const input = document.getElementById('answer').value.trim();
        if (input === quizList[currentIndex].kr) {
            playSound(600); // 答對：高音
            alert("答對了！");
            currentIndex = (currentIndex + 1) % quizList.length;
            document.getElementById('answer').value = '';
            showQuestion();
        } else {
            playSound(200); // 答錯：低音
            alert("再聽一次試試看！");
        }
    }
</script>
</body>
</html>
